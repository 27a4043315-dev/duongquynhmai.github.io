<!DOCTYPE html>
<html>
<head>
<title>Duongquynhmai</title>
</head>

<body>

<p id="demo"></p>

<script>
let fullName = "Duong Thi Quynh Mai"; 
let studentId = "27A4043315";

let nameParts = fullName.split(" ");
let firstName = nameParts[nameParts.length - 1];
let lastNameInitial = nameParts[0][0];
let middleNameInitial = nameParts[1][0];

let email = firstName + lastNameInitial + middleNameInitial + "." + studentId.toLowerCase() + "@hvnh.edu.vn";
email = email.toLowerCase();

let coursePeriod = studentId.substring(0, 2);
let faculty = studentId.substring(3,6);
let lastFour = studentId.slice(-4);
let sum = 0;

for (let num of lastFour) {
  sum += Number(num);	
}

document.getElementById("demo").innerHTML =
"Xin chào " + fullName +
", bạn là sinh viên khóa " + coursePeriod +
", khoa " + faculty +
", tổng 4 số cuối trong mã sinh viên là " + sum +
"<br>Email: " + email;

</script>

</body>
</html>
